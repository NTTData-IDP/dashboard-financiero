<div class="dashboard">
  <h1>Dashboard Financiero</h1>
  <div class="filters">
    <input type="text" placeholder="Buscar proveedor" [(ngModel)]="searchQuery" (input)="applyFilters()" />
    <select [(ngModel)]="countryFilter" (change)="applyFilters()">
      <option value="">Todos los países</option>
      <option *ngFor="let country of uniqueCountries">
        {{ country }}
      </option>
    </select>
  </div>
  <table>
    <thead>
      <tr>
        <th>Proveedor</th>
        <th>País</th>
        <th>Ingresos</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of filteredData">
        <td>{{ item.provider }}</td>
        <td>{{ item.country }}</td>
        <td>{{ item.revenue | currency }}</td>
      </tr>
    </tbody>
  </table>
</div>
